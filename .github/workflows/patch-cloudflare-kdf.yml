name: Patch Cloudflare Password KDF

on:
  push:
    branches:
      - codex/complete-writing-studio
    paths:
      - .github/workflows/patch-cloudflare-kdf.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/complete-writing-studio
      - name: Patch password KDF source
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const path = 'scripts/mojie-api.mjs';
          const source = readFileSync(path, 'utf8');
          const before = `async function hashPassword(password, salt = randomToken(18)) {
            if (typeof password !== 'string' || password.length < 10 || password.length > 256) {
              throw new HttpError(400, 'weak_password', '密码长度必须为10到256个字符。');
            }
            const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']);
            const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', hash: 'SHA-256', salt: fromBase64Url(salt), iterations: 310_000 }, material, 256);
            return { salt, hash: toBase64Url(new Uint8Array(bits)) };
          }

          async function verifyPassword(password, salt, expected) {
            const result = await hashPassword(password, salt);
            if (result.hash.length !== expected.length) return false;
            let difference = 0;
            for (let index = 0; index < expected.length; index += 1) difference |= result.hash.charCodeAt(index) ^ expected.charCodeAt(index);
            return difference === 0;
          }`;
          const after = `const PASSWORD_KDF = 'pbkdf2-sha256';
          const PASSWORD_ITERATIONS = 100_000;

          async function derivePasswordHash(password, salt, iterations) {
            const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']);
            const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', hash: 'SHA-256', salt: fromBase64Url(salt), iterations }, material, 256);
            return toBase64Url(new Uint8Array(bits));
          }

          async function hashPassword(password, salt = randomToken(18)) {
            if (typeof password !== 'string' || password.length < 10 || password.length > 256) {
              throw new HttpError(400, 'weak_password', '密码长度必须为10到256个字符。');
            }
            const digest = await derivePasswordHash(password, salt, PASSWORD_ITERATIONS);
            return { salt, hash: \`${PASSWORD_KDF}\$${PASSWORD_ITERATIONS}\$\${digest}\` };
          }

          async function verifyPassword(password, salt, expected) {
            let iterations = PASSWORD_ITERATIONS;
            let expectedDigest = String(expected || '');
            const versioned = expectedDigest.match(/^pbkdf2-sha256\\$(\\d+)\\$(.+)$/u);
            if (versioned) {
              iterations = Number(versioned[1]);
              expectedDigest = versioned[2];
            }
            if (!Number.isInteger(iterations) || iterations < 10_000 || iterations > PASSWORD_ITERATIONS) return false;
            const actualDigest = await derivePasswordHash(password, salt, iterations);
            if (actualDigest.length !== expectedDigest.length) return false;
            let difference = 0;
            for (let index = 0; index < expectedDigest.length; index += 1) difference |= actualDigest.charCodeAt(index) ^ expectedDigest.charCodeAt(index);
            return difference === 0;
          }`;

          if (!source.includes(before)) {
            throw new Error('Expected password KDF block was not found; refusing an ambiguous patch.');
          }
          const next = source.replace(before, after);
          if (next.includes('iterations: 310_000')) throw new Error('Unsupported PBKDF2 iteration count remains.');
          writeFileSync(path, next);
          NODE
      - name: Commit source fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/mojie-api.mjs
          git commit -m "fix: use versioned Cloudflare-compatible password KDF"
          git push origin HEAD:codex/complete-writing-studio
