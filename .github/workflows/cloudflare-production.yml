name: Cloudflare Production Provision

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY_MOJIE to provision and deploy production
        required: true
        type: string
      custom_domain:
        description: Optional custom hostname already added to this Cloudflare account (no scheme or path)
        required: false
        type: string

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: inputs.confirmation == 'DEPLOY_MOJIE'
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_WORKER_NAME: ${{ vars.MOJIE_WORKER_NAME || 'mojie-writing-studio' }}
      CLOUDFLARE_D1_DATABASE_NAME: ${{ vars.MOJIE_D1_DATABASE_NAME || 'mojie-writing-studio' }}
      APP_ORIGIN: ${{ vars.MOJIE_APP_ORIGIN }}
      CUSTOM_DOMAIN: ${{ inputs.custom_domain }}
      MOJIE_ICP_NUMBER: ${{ vars.MOJIE_ICP_NUMBER }}
      OWNER_INITIALIZATION_KEY: ${{ secrets.OWNER_INITIALIZATION_KEY || secrets.MOJIE_ADMIN_TOKEN }}
      LOCAL_DRAFT_KEK: ${{ secrets.LOCAL_DRAFT_KEK }}
      MOJIE_BACKUP_MASTER_KEY: ${{ secrets.MOJIE_BACKUP_MASTER_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$CLOUDFLARE_ACCOUNT_ID" ]]
          [[ -n "$CLOUDFLARE_API_TOKEN" ]]
          [[ ${#OWNER_INITIALIZATION_KEY} -ge 32 ]]
          [[ -n "$MOJIE_BACKUP_MASTER_KEY" ]]
          OWNER_INITIALIZATION_KEY="$OWNER_INITIALIZATION_KEY" LOCAL_DRAFT_KEK="$LOCAL_DRAFT_KEK" MOJIE_BACKUP_MASTER_KEY="$MOJIE_BACKUP_MASTER_KEY" node --input-type=module -e '
            if (Buffer.from(process.env.LOCAL_DRAFT_KEK || "", "base64url").byteLength !== 32) throw new Error("LOCAL_DRAFT_KEK must be exactly 32 random bytes encoded as base64url");
            if ((process.env.OWNER_INITIALIZATION_KEY || "").length < 32) throw new Error("OWNER_INITIALIZATION_KEY must contain at least 32 characters");
            if ((process.env.MOJIE_BACKUP_MASTER_KEY || "").length < 32) throw new Error("MOJIE_BACKUP_MASTER_KEY must contain at least 32 characters");
          '

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --loglevel=error --no-audit --no-fund

      - name: Create or reuse D1
        shell: bash
        run: |
          set -euo pipefail
          d1_json="$(npx wrangler d1 list --json)"
          d1_id="$(D1_JSON="$d1_json" D1_NAME="$CLOUDFLARE_D1_DATABASE_NAME" node --input-type=module -e '
            const values = JSON.parse(process.env.D1_JSON || "[]");
            const item = values.find((value) => value.name === process.env.D1_NAME);
            if (item) process.stdout.write(String(item.uuid || item.id));
          ')"
          if [[ -z "$d1_id" ]]; then
            npx wrangler d1 create "$CLOUDFLARE_D1_DATABASE_NAME" --location apac
            d1_json="$(npx wrangler d1 list --json)"
            d1_id="$(D1_JSON="$d1_json" D1_NAME="$CLOUDFLARE_D1_DATABASE_NAME" node --input-type=module -e '
              const values = JSON.parse(process.env.D1_JSON || "[]");
              const item = values.find((value) => value.name === process.env.D1_NAME);
              if (!item) throw new Error(`D1 database not found: ${process.env.D1_NAME}`);
              process.stdout.write(String(item.uuid || item.id));
            ')"
          fi
          echo "CLOUDFLARE_D1_DATABASE_ID=$d1_id" >> "$GITHUB_ENV"

          cat > wrangler.production-d1.json <<EOF
          {
            "name": "$CLOUDFLARE_WORKER_NAME",
            "compatibility_date": "2026-07-11",
            "d1_databases": [
              {
                "binding": "DB",
                "database_name": "$CLOUDFLARE_D1_DATABASE_NAME",
                "database_id": "$d1_id",
                "migrations_dir": "migrations"
              }
            ]
          }
          EOF
          npx wrangler d1 migrations apply DB --remote --config wrangler.production-d1.json

      - name: Resolve exact production origin
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$CUSTOM_DOMAIN" ]]; then
            CUSTOM_DOMAIN="$(CUSTOM_DOMAIN="$CUSTOM_DOMAIN" node --input-type=module -e '
              const value = (process.env.CUSTOM_DOMAIN || "").trim().toLowerCase();
              const url = new URL(`https://${value}`);
              if (!value || url.hostname !== value || url.port || url.pathname !== "/" || /[\\s/?#]/u.test(value)) {
                throw new Error("custom_domain must be a bare HTTPS hostname without a scheme, port, path or wildcard");
              }
              process.stdout.write(value);
            ')"
            APP_ORIGIN="https://${CUSTOM_DOMAIN}"
            echo "CUSTOM_DOMAIN=$CUSTOM_DOMAIN" >> "$GITHUB_ENV"
          elif [[ -z "$APP_ORIGIN" ]]; then
            subdomain_json="$(curl --fail --silent --show-error --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain")"
            workers_subdomain="$(SUBDOMAIN_JSON="$subdomain_json" node --input-type=module -e '
              const value = JSON.parse(process.env.SUBDOMAIN_JSON || "{}");
              process.stdout.write(value.result?.subdomain || "");
            ')"
            if [[ -z "$workers_subdomain" ]]; then
              account_hash="$(printf '%s' "$CLOUDFLARE_ACCOUNT_ID" | sha256sum | cut -c1-10)"
              candidate="mojie-${account_hash}"
              registration_json="$(curl --fail --silent --show-error --request PUT --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" --header "Content-Type: application/json" --data "{\"subdomain\":\"${candidate}\"}" "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain")"
              workers_subdomain="$(SUBDOMAIN_JSON="$registration_json" node --input-type=module -e '
                const value = JSON.parse(process.env.SUBDOMAIN_JSON || "{}");
                if (!value.success || !value.result?.subdomain) throw new Error("workers.dev subdomain registration failed");
                process.stdout.write(value.result.subdomain);
              ')"
            fi
            APP_ORIGIN="https://${CLOUDFLARE_WORKER_NAME}.${workers_subdomain}.workers.dev"
          fi
          APP_ORIGIN="$APP_ORIGIN" node --input-type=module -e '
            const origin = new URL(process.env.APP_ORIGIN);
            if (origin.protocol !== "https:" || origin.origin !== process.env.APP_ORIGIN) throw new Error("MOJIE_APP_ORIGIN must be an exact HTTPS origin");
          '
          echo "APP_ORIGIN=$APP_ORIGIN" >> "$GITHUB_ENV"

      - name: Verify and build
        run: |
          node --check scripts/mojie-auth-api.mjs
          node --check scripts/mojie-api.mjs
          node --check scripts/mojie-extended-api.mjs
          node --check scripts/mojie-privacy-guard.mjs
          node --check scripts/cloudflare-fetch-entry.mjs
          node --check scripts/verify-deployed-assets.mjs
          node --check scripts/test-privacy-guard.mjs
          node scripts/test-privacy-guard.mjs
          npm audit --omit=dev --audit-level=moderate
          npm audit --audit-level=moderate
          npm test
          npm run typecheck
          npm run test:security-final
          npm run build
          npm run test:worker-entry
          npm run test:core-worker-local

      - name: Configure optional custom domain
        if: env.CUSTOM_DOMAIN != ''
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module -e '
            import { readFileSync, writeFileSync } from "node:fs";
            const path = "dist/wrangler.json";
            const config = JSON.parse(readFileSync(path, "utf8"));
            const pattern = process.env.CUSTOM_DOMAIN;
            config.routes = [
              ...(Array.isArray(config.routes) ? config.routes.filter((route) => route?.pattern !== pattern) : []),
              { pattern, custom_domain: true }
            ];
            writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          '

      - name: Deploy Worker and managed secrets
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/wrangler.json
          secrets: |
            OWNER_INITIALIZATION_KEY
            LOCAL_DRAFT_KEK
            MOJIE_BACKUP_MASTER_KEY
        env:
          OWNER_INITIALIZATION_KEY: ${{ secrets.OWNER_INITIALIZATION_KEY || secrets.MOJIE_ADMIN_TOKEN }}
          LOCAL_DRAFT_KEK: ${{ secrets.LOCAL_DRAFT_KEK }}
          MOJIE_BACKUP_MASTER_KEY: ${{ secrets.MOJIE_BACKUP_MASTER_KEY }}

      - name: Smoke check
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          set -euo pipefail
          TARGET_URL="$APP_ORIGIN"
          ready=0
          root_status=000
          session_status=000
          draft_status=000
          cache_control_ok=0
          for attempt in {1..30}; do
            root_status="$(curl --silent --output /dev/null --write-out '%{http_code}' "$TARGET_URL/" || true)"
            session_status="$(curl --silent --output /tmp/mojie-session.json --dump-header /tmp/mojie-session.headers --write-out '%{http_code}' "$TARGET_URL/api/core/auth/session" || true)"
            draft_status="$(curl --silent --output /dev/null --write-out '%{http_code}' "$TARGET_URL/api/core/auth/draft-key" || true)"
            cache_control_ok=0
            if grep --ignore-case --quiet '^cache-control: no-store, private' /tmp/mojie-session.headers 2>/dev/null; then
              cache_control_ok=1
            fi
            if [[ "$root_status" == "200" && "$session_status" == "401" && "$draft_status" == "401" && "$cache_control_ok" == "1" ]]; then
              ready=1
              break
            fi
            sleep 2
          done
          if [[ "$ready" != "1" ]]; then
            echo "::error::Production smoke failed after propagation retries (root=$root_status session=$session_status draft=$draft_status cache=$cache_control_ok)"
            exit 1
          fi
          MOJIE_DEPLOYMENT_URL="$TARGET_URL" node scripts/verify-deployed-assets.mjs

      - name: Deployment summary
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          {
            echo "## Mojie production provisioned"
            echo
            echo "- Worker: \`${CLOUDFLARE_WORKER_NAME}\`"
            echo "- D1: \`${CLOUDFLARE_D1_DATABASE_NAME}\`"
            echo "- R2: not enabled or used"
            echo "- DOCX: browser IndexedDB plus manual download"
            echo "- Automatic external backup: WebDAV/S3-compatible after user configuration"
            echo "- Worker deployment URL: ${DEPLOYMENT_URL}"
            echo "- Public application origin: ${APP_ORIGIN}"
            if [[ -n "$CUSTOM_DOMAIN" ]]; then
              echo "- Custom domain: ${CUSTOM_DOMAIN}"
              echo "- ICP display: ${MOJIE_ICP_NUMBER:-not configured}"
            fi
            echo "- All D1 migrations were applied with Cloudflare's migration backup boundary."
            echo "- OWNER_INITIALIZATION_KEY, LOCAL_DRAFT_KEK and MOJIE_BACKUP_MASTER_KEY were stored as Worker secrets."
            echo "- APP_ORIGIN: ${APP_ORIGIN}"
          } >> "$GITHUB_STEP_SUMMARY"
