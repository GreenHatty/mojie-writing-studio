name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - codex/complete-writing-studio

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Typecheck
        run: npm run typecheck
      - name: Verify Sites worker entry
        run: npm run test:worker-entry
      - name: Production build
        run: npm run build
