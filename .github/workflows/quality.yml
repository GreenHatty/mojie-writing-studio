name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - codex/complete-writing-studio

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          npm ci --loglevel=error --no-audit --no-fund 2>&1 | tee npm-install.log
      - name: Upload install diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-install-diagnostics
          path: npm-install.log
          if-no-files-found: ignore
      - name: Unit tests
        run: npm test
      - name: Typecheck
        run: npm run typecheck
      - name: Verify Sites worker entry
        run: npm run test:worker-entry
      - name: Production build
        run: npm run build
