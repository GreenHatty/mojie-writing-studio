name: Quality

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --loglevel=error --no-audit --no-fund
      - name: Unit tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee unit-tests.log
      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          path: unit-tests.log
          if-no-files-found: ignore
      - name: Typecheck
        run: npm run typecheck
      - name: Production build
        run: npm run build
      - name: Verify Sites worker entry
        run: npm run test:worker-entry
