name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - codex/complete-writing-studio

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        id: install
        shell: bash
        run: |
          set -o pipefail
          npm ci --legacy-peer-deps --loglevel=error --no-audit --no-fund 2>&1 | tee npm-install.log
      - name: Unit tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee unit-tests.log
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Verify Sites worker entry
        id: worker
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:worker-entry 2>&1 | tee worker-entry.log
      - name: Production build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee production-build.log
      - name: Upload quality diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-diagnostics
          path: |
            npm-install.log
            unit-tests.log
            typecheck.log
            worker-entry.log
            production-build.log
          if-no-files-found: ignore
      - name: Enforce quality gate
        if: always()
        shell: bash
        run: |
          test "${{ steps.install.outcome }}" = "success"
          test "${{ steps.tests.outcome }}" = "success"
          test "${{ steps.typecheck.outcome }}" = "success"
          test "${{ steps.worker.outcome }}" = "success"
          test "${{ steps.build.outcome }}" = "success"
