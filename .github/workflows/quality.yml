name: Quality

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --loglevel=error --no-audit --no-fund
      - name: Verify Worker API syntax
        run: |
          node --check scripts/mojie-auth-api.mjs
          node --check scripts/mojie-api.mjs
          node --check scripts/ranking-adapters.mjs
          node --check scripts/mojie-extended-api.mjs
          node --check scripts/mojie-privacy-guard.mjs
          node --check scripts/cloudflare-fetch-entry.mjs
          node --check scripts/cloudflare-preview-acceptance.mjs
          node --check scripts/verify-deployed-assets.mjs
          node --check scripts/test-privacy-guard.mjs
          node --check scripts/prepare-dist.mjs
          node --check public/sw.js
          node --check public/text-check-worker.js
      - name: Verify privacy boundaries
        run: node scripts/test-privacy-guard.mjs
      - name: Unit tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee unit-tests.log
      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          path: unit-tests.log
          if-no-files-found: ignore
      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: ignore
      - name: Install browser for E2E
        run: npx playwright install --with-deps chromium
      - name: Browser E2E and responsive regression
        run: npm run test:e2e
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-e2e-diagnostics
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
      - name: Production build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee production-build.log
      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-build-diagnostics
          path: production-build.log
          if-no-files-found: ignore
      - name: Verify Sites worker entry
        run: npm run test:worker-entry
